version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/news.db
      - TZ=Europe/Bucharest
      - DAILY_RUN_HOUR=8
    env_file:
      - ./backend/.env
    restart: unless-stopped

