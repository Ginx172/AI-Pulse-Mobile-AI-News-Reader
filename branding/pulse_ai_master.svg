<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Black panel with rounded corners, 5:6 aspect ratio (500x600) -->
  <rect x="0" y="0" width="500" height="600" rx="70" fill="#000000"/>

  <!-- Icon: P with extended leg + pulse tail, centered horizontally -->
  <!-- Panel center x=250. Icon spans roughly x=145 to x=370 -->

  <!-- Bowl of P -->
  <path d="M 155 115 L 275 115 Q 355 115 355 180 Q 355 245 275 245 L 155 245"
        fill="none" stroke="url(#pulseGrad)" stroke-width="32"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Extended leg + ECG pulse tail -->
  <path d="M 155 115 L 155 385 L 187 385 L 205 350 L 226 440 L 251 295 L 276 408 L 298 385 L 370 385"
        fill="none" stroke="url(#pulseGrad)" stroke-width="32"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark "Pulse AI" in Ukrainian flag yellow #FFD500 -->
  <text x="250" y="535"
        text-anchor="middle"
        font-family="Inter, Geist, Satoshi, 'Helvetica Neue', Arial, sans-serif"
        font-size="78"
        font-weight="700"
        fill="#FFD500"
        letter-spacing="-2">Pulse AI</text>
</svg>
